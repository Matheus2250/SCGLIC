<!-- Usuários Page -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Gerenciar Usuários</h2>
  <button class="btn btn-primary" id="novo-usuario-btn">
    <i class="bi bi-plus-circle"></i> Novo Usuário
  </button>
</div>

<div class="card">
  <div class="card-body">
    <div id="usuarios-loading" class="loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
    </div>
    <div id="usuarios-container" class="table-responsive d-none">
      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Nível de Acesso</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="usuarios-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal para Adicionar/Editar Usuário -->
<div class="modal fade" id="usuario-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="usuario-modal-title">Novo Usuário</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <form id="usuario-form">
          <input type="hidden" id="usuario-id">
          <div class="mb-3">
            <label for="usuario-nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="usuario-nome" required>
          </div>
          <div class="mb-3">
            <label for="usuario-email" class="form-label">Email</label>
            <input type="email" class="form-control" id="usuario-email" required>
          </div>
          <div class="mb-3">
            <label for="usuario-senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="usuario-senha" required>
          </div>
          <div class="mb-3">
            <label for="usuario-nivel" class="form-label">Nível de Acesso</label>
            <select class="form-select" id="usuario-nivel" required>
              <option value="usuario">Usuário</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="salvar-usuario-btn">Salvar</button>
      </div>
    </div>
  </div>
</div>
